# CI — runs on every push and pull request.
#
# Two jobs, mirroring the local gates exactly:
#   python: ruff (lint) + mypy (types) + pytest (all tests are offline by
#           design — fixtures and fakes, no DATABASE_URL, no network)
#   web:    strict TypeScript production build of the Next.js site
#
# If either job is red on GitHub, do not deploy — the same commands can be
# run locally via `make lint`, `make test`, and `npm run build` in web/.

name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  python:
    name: Lint, types, tests (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy (type check)
        run: mypy .

      - name: Pytest (offline test suite)
        run: pytest -q

  web:
    name: Build website (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Production build (strict TS)
        run: npm run build
